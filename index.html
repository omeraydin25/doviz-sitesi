<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Döviz Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f0f0f,#1c1c1c);
  color:white;
  text-align:center;
}

h1{
  color:#00ffcc;
  margin-top:20px;
}

.card{
  background:#222;
  width:260px;
  padding:15px;
  margin:10px auto;
  border-radius:12px;
}

button{
  padding:10px 20px;
  background:#00ffcc;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  margin-top:10px;
}

canvas{
  background:#111;
  border-radius:12px;
  margin:20px auto;
  display:block;
  max-width:90%;
}
</style>
</head>

<body>

<h1>💱 Döviz Pro</h1>

<div id="data">Yükleniyor...</div>

<button onclick="getData()">🔄 Yenile</button>

<canvas id="chart"></canvas>

<script>
let chart;
let history = [];

async function getData(){
  try {
    const res = await fetch("https://open.er-api.com/v6/latest/USD");
    const data = await res.json();

    document.getElementById("data").innerHTML = `
      <div class="card">💵 USD → TRY: ${data.rates.TRY}</div>
      <div class="card">💶 EUR → USD: ${data.rates.EUR}</div>
      <div class="card">💷 GBP → USD: ${data.rates.GBP}</div>
    `;

    updateChart(data.rates.TRY);

  } catch (e) {
    document.getElementById("data").innerHTML = "Hata oluştu 😢";
  }
}

function updateChart(value){
  history.push(Number(value));
  if(history.length > 10) history.shift();

  const ctx = document.getElementById("chart").getContext("2d");

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: history.map((_,i)=>i+1),
      datasets: [{
        label: "USD/TRY",
        data: history,
        borderColor: "#00ffcc",
        fill: false,
        tension: 0.3
      }]
    }
  });
}

getData();
setInterval(getData, 10000);
</script>

</body>
</html>
