<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Canlı Küresel Borsa & Döviz Paneli</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f7fb;
  color:#111;
}

.header{
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  background:white;
  border-bottom:1px solid #ddd;
}

.container{
  display:flex;
  height:calc(100vh - 60px);
}

.sidebar{
  width:35%;
  overflow:auto;
  background:white;
  border-right:1px solid #ddd;
}

.section-title{
  padding:10px;
  font-weight:bold;
  background:#f0f2f5;
}

.item{
  padding:12px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.item:hover{
  background:#f0f7ff;
}

.symbol{
  font-weight:bold;
}

.price{
  color:#0aa;
}

.right{
  flex:1;
  padding:20px;
}

canvas{
  background:white;
  border-radius:10px;
  padding:10px;
  border:1px solid #ddd;
}

.box{
  margin:10px 0;
  display:flex;
  justify-content:space-around;
}

.buy{color:green;}
.sell{color:red;}
</style>
</head>

<body>

<div class="header">📊 CANLI KÜRESEL BORSA + DÖVİZ PANELİ</div>

<div class="container">

<div class="sidebar" id="sidebar"></div>

<div class="right">
<h3 id="title">Seçim Yap</h3>

<div class="box">
<div class="buy">ALIŞ: <span id="buy">-</span></div>
<div class="sell">SATIŞ: <span id="sell">-</span></div>
</div>

<canvas id="chart"></canvas>
</div>

</div>

<script>
let chart;
let history = [];

const markets = [
{n:"USD/TRY",b:"USD",q:"TRY"},
{n:"EUR/USD",b:"EUR",q:"USD"},
{n:"GBP/USD",b:"GBP",q:"USD"},
{n:"BTC/USD",b:"BTC",q:"USD"},
{n:"ETH/USD",b:"ETH",q:"USD"}
];

const indices = [
"BIST 100","DAX","NASDAQ","S&P 500","FTSE 100","Nikkei 225","Hang Seng","CAC 40"
];

async function load(){
const res = await fetch("https://open.er-api.com/v6/latest/USD");
const data = await res.json();

let html = "<div class='section-title'>💱 Döviz</div>";

markets.forEach(m=>{
let rate = data.rates[m.b] || (1/data.rates[m.q]);
let price = rate.toFixed(4);
let buy = (price*1.002).toFixed(4);
let sell = (price*0.998).toFixed(4);

html += `<div class='item' onclick='selectMarket("${m.n}",${price})'>
<div class='symbol'>${m.n}</div>
<div class='price'>${price}</div>
<small>${buy} / ${sell}</small>
</div>`;
});

html += "<div class='section-title'>📈 Borsalar</div>";

indices.forEach(i=>{
html += `<div class='item' onclick='selectIndex("${i}")'>
<div class='symbol'>${i}</div>
<div class='price'>--</div>
</div>`;
});

document.getElementById("sidebar").innerHTML = html;
}

function selectMarket(name,price){
document.getElementById("title").innerText=name;
document.getElementById("buy").innerText=(price*1.002).toFixed(4);
document.getElementById("sell").innerText=(price*0.998).toFixed(4);
update(price);
}

function selectIndex(name){
document.getElementById("title").innerText=name;
let fake = Math.random()*1000;
document.getElementById("buy").innerText=fake.toFixed(2);
document.getElementById("sell").innerText=(fake*0.99).toFixed(2);
update(fake);
}

function update(v){
history.push(Number(v));
if(history.length>25) history.shift();

const ctx=document.getElementById("chart").getContext("2d");
if(chart) chart.destroy();

chart=new Chart(ctx,{type:"line",data:{labels:history.map((_,i)=>i+1),datasets:[{data:history,borderColor:"#00aaff",tension:0.3}]}});
}

load();
setInterval(load,8000);
</script>

</body>
</html>
