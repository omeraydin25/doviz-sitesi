<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Baydınsal Trading Sim</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6fb;
}

.header{
  padding:12px;
  text-align:center;
  font-weight:bold;
  background:white;
  border-bottom:1px solid #ddd;
}

.container{
  display:flex;
  height:calc(100vh - 60px);
}

.left{
  width:35%;
  background:white;
  border-right:1px solid #ddd;
  overflow:auto;
}

.item{
  padding:12px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.item:hover{background:#eef3ff;}

.symbol{font-weight:bold;}
.price{color:#0b57ff;}

.right{
  flex:1;
  padding:15px;
}

canvas{
  background:white;
  border-radius:10px;
  border:1px solid #ddd;
}

.box{
  display:flex;
  justify-content:space-around;
  margin:10px 0;
  font-weight:bold;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.buyBtn{background:green;color:white;}
.sellBtn{background:red;color:white;}

.portfolio{
  margin-top:10px;
  background:#fff;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">📊 Baydınsal Trading Simulator</div>

<div class="container">

<div class="left" id="list"></div>

<div class="right">

<h3 id="title">Seç</h3>

<div class="box">
<div>Fiyat: <span id="price">-</span></div>
<div>Bakiye: $<span id="balance">10000</span></div>
</div>

<button class="buyBtn" onclick="buy()">AL</button>
<button class="sellBtn" onclick="sell()">SAT</button>

<canvas id="chart"></canvas>

<div class="portfolio" id="portfolio">
<h4>📦 Portföy</h4>
<div id="plist"></div>
</div>

</div>
</div>

<script>

let balance = 10000;
let selected = null;
let priceNow = 0;
let history = [];
let chart;

let portfolio = {};

const assets = ["BTC","ETH","USDTRY","EURUSD","BIST100","NASDAQ"];

/* RANDOM FİYAT */
function getPrice(){
  return (Math.random()*5000+50).toFixed(2);
}

/* LOAD */
function load(){
  let html="";

  assets.forEach(a=>{
    let p = getPrice();

    html+=`
      <div class="item" onclick="selectAsset('${a}',${p})">
        <div class="symbol">${a}</div>
        <div class="price">${p}</div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML=html;
  document.getElementById("balance").innerText=balance.toFixed(2);
  renderPortfolio();
}

/* SELECT */
function selectAsset(name,price){
  selected=name;
  priceNow=price;

  document.getElementById("title").innerText=name;
  document.getElementById("price").innerText=price;

  history.push(Number(price));
  if(history.length>20) history.shift();

  const ctx=document.getElementById("chart").getContext("2d");

  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:"line",
    data:{
      labels:history.map((_,i)=>i+1),
      datasets:[{
        data:history,
        borderColor:"#0b57ff",
        tension:0.3
      }]
    }
  });
}

/* AL */
function buy(){
  if(!selected) return;

  if(balance >= priceNow){
    balance -= priceNow;

    portfolio[selected] = (portfolio[selected] || 0) + 1;

    update();
  }
}

/* SAT */
function sell(){
  if(!selected) return;

  if(portfolio[selected] > 0){
    balance += priceNow;
    portfolio[selected] -= 1;
  }

  update();
}

/* UPDATE */
function update(){
  document.getElementById("balance").innerText=balance.toFixed(2);
  renderPortfolio();
}

/* PORTFOLIO */
function renderPortfolio(){
  let html="";

  for(let k in portfolio){
    html+=`<div>${k} : ${portfolio[k]}</div>`;
  }

  document.getElementById("plist").innerHTML=html || "Boş";
}

load();
setInterval(load,5000);

</script>

</body>
</html>
