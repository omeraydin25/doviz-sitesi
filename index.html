<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Döviz Takip</title>

<style>
body{
  font-family: Arial;
  background:#0f0f0f;
  color:white;
  text-align:center;
  padding:20px;
}
h1{ color:#00ffcc; }

.box{
  background:#1e1e1e;
  margin:10px auto;
  padding:15px;
  width:220px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>💱 Döviz Takip</h1>
<div id="data">Yükleniyor...</div>

<script>
async function getData(){
  try {
    const res = await fetch("https://api.exchangerate.host/latest?base=USD");
    const data = await res.json();

    document.getElementById("data").innerHTML = `
      <div class="box">EUR → ${data.rates.EUR}</div>
      <div class="box">GBP → ${data.rates.GBP}</div>
      <div class="box">TRY → ${data.rates.TRY}</div>
    `;
  } catch(e){
    document.getElementById("data").innerHTML = "Hata oluştu 😢";
  }
}

getData();
</script>
<div class="box">EUR → TRY: 37.10</div>
<div class="box">GBP → TRY: 43.50</div>

<p>⚠️ Demo sürüm</p>

</body>
</html>
