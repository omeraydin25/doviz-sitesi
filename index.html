<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Baydınsal Trading</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f7fb;
}

/* TOP */
.top{
  background:white;
  padding:15px;
  font-weight:bold;
  border-bottom:1px solid #ddd;
}

/* LAYOUT */
.container{
  display:flex;
  height:calc(100vh - 50px);
}

/* LEFT */
.left{
  width:35%;
  background:white;
  overflow:auto;
  border-right:1px solid #ddd;
}

.item{
  padding:12px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.item:hover{background:#f0f0f0}
.price{color:#0077ff}

/* RIGHT */
.right{
  flex:1;
  padding:15px;
}

canvas{
  background:white;
  border:1px solid #ddd;
  border-radius:10px;
}

.box{
  display:flex;
  justify-content:space-around;
  margin:10px 0;
}
</style>
</head>

<body>

<div class="top">📊 BAYDINsAL PRO TRADING (GitHub Version)</div>

<div class="container">

<div class="left" id="list"></div>

<div class="right">
  <h2 id="title">Seç</h2>

  <div class="box">
    <div>ALIŞ: <span id="buy">-</span></div>
    <div>SATIŞ: <span id="sell">-</span></div>
  </div>

  <canvas id="chart"></canvas>
</div>

</div>

<script>

let chart;
let history=[];
let currentPrice=0;

const coins=[
 "USD","EUR","GBP","JPY","TRY","BTC","ETH"
];

async function getData(){
  let res=await fetch("https://open.er-api.com/v6/latest/USD");
  return await res.json();
}

async function load(){
  let data=await getData();
  let html="";

  coins.forEach(c=>{
    let price=data.rates[c] || 1;
    let buy=price*1.002;
    let sell=price*0.998;

    html+=`
      <div class="item" onclick="selectCoin('${c}',${price})">
        <b>${c}/USD</b><br>
        <span class="price">${price.toFixed(4)}</span><br>
        <small>Al:${buy.toFixed(4)} Sat:${sell.toFixed(4)}</small>
      </div>
    `;
  });

  document.getElementById("list").innerHTML=html;
}

function selectCoin(name,price){
  document.getElementById("title").innerText=name;

  document.getElementById("buy").innerText=(price*1.002).toFixed(4);
  document.getElementById("sell").innerText=(price*0.998).toFixed(4);

  draw(price);
}

function draw(price){
  history.push(price);
  if(history.length>25) history.shift();

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:history.map((_,i)=>i),
      datasets:[{
        data:history,
        borderColor:"blue",
        tension:0.3
      }]
    }
  });
}

load();
setInterval(load,10000);

</script>

</body>
</html>
