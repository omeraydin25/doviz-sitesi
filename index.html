<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Canlı Döviz Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:white;
  text-align:center;
}

.header{
  padding:20px;
  font-size:22px;
  font-weight:bold;
  background:#111a2e;
  color:#00ffcc;
}

table{
  width:90%;
  max-width:650px;
  margin:20px auto;
  border-collapse:collapse;
  background:#16213e;
  border-radius:10px;
  overflow:hidden;
}

th, td{
  padding:12px;
  border-bottom:1px solid #222;
}

th{
  background:#111a2e;
}

button{
  padding:10px 20px;
  background:#00ffcc;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  margin:10px;
}

canvas{
  width:90%;
  max-width:650px;
  margin:20px auto;
  display:block;
  background:#16213e;
  border-radius:12px;
  padding:10px;
}

.alarm{
  margin:10px;
}
</style>
</head>

<body>

<div class="header">💱 Canlı Finans Pro</div>

<button onclick="getData()">🔄 Yenile</button>

<div class="alarm">
  🔔 Alarm (USD/TRY üst sınır):
  <input id="limit" type="number" placeholder="örn 45">
  <button onclick="setAlarm()">Ayarla</button>
</div>

<table>
<tr><th>Enstrüman</th><th>Değer</th></tr>

<tr><td>USD / TRY</td><td id="usd">-</td></tr>
<tr><td>EUR / USD</td><td id="eur">-</td></tr>
<tr><td>GBP / USD</td><td id="gbp">-</td></tr>
<tr><td>BTC / USD</td><td id="btc">-</td></tr>
<tr><td>ALTIN (XAU)</td><td id="gold">-</td></tr>
</table>

<canvas id="chart"></canvas>

<script>
let chart;
let history = [];
let alarmLimit = null;

function setAlarm(){
  alarmLimit = document.getElementById("limit").value;
  alert("Alarm ayarlandı: " + alarmLimit);
}

async function getData(){
  try{
    // Döviz
    const res = await fetch("https://open.er-api.com/v6/latest/USD");
    const data = await res.json();

    // Bitcoin (basit fake API)
    const btc = await fetch("https://api.coindesk.com/v1/bpi/currentprice/USD.json");
    const btcData = await btc.json();

    const btcPrice = btcData.bpi.USD.rate_float;

    // Altın (yaklaşık API)
    const goldRes = await fetch("https://api.metals.live/v1/spot/gold");
    const goldData = await goldRes.json();

    const goldPrice = goldData[0][1];

    // UI
    document.getElementById("usd").innerText = data.rates.TRY;
    document.getElementById("eur").innerText = data.rates.EUR;
    document.getElementById("gbp").innerText = data.rates.GBP;
    document.getElementById("btc").innerText = btcPrice.toFixed(2);
    document.getElementById("gold").innerText = goldPrice;

    // Alarm kontrol
    if(alarmLimit && data.rates.TRY > alarmLimit){
      alert("🚨 USD/TRY alarm tetiklendi: " + data.rates.TRY);
      alarmLimit = null;
    }

    updateChart(data.rates.TRY);

  } catch(e){
    console.log(e);
  }
}

function updateChart(value){
  history.push(Number(value));
  if(history.length > 10) history.shift();

  const ctx = document.getElementById("chart").getContext("2d");

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type:"line",
    data:{
      labels: history.map((_,i)=>i+1),
      datasets:[{
        label:"USD/TRY",
        data:history,
        borderColor:"#00ffcc",
        tension:0.3
      }]
    }
  });
}

getData();
setInterval(getData, 5000);
</script>

</body>
</html>
