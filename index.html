<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Baydınsal Pro Trading</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6fb;
  color:#111;
}

/* LOGIN */
.login{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.login input{
  padding:10px;
  margin:5px;
  width:200px;
}

button{
  padding:10px;
  cursor:pointer;
  background:#111;
  color:white;
  border:none;
}

/* HEADER */
.header{
  background:#fff;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  border-bottom:1px solid #ddd;
}

/* BALANCE */
.balance{
  position:absolute;
  right:20px;
  top:15px;
  font-weight:bold;
}

/* LAYOUT */
.container{
  display:flex;
  height:calc(100vh - 60px);
}

/* MARKET */
.market{
  width:35%;
  background:#fff;
  overflow:auto;
  border-right:1px solid #ddd;
}

.item{
  padding:12px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.item:hover{
  background:#f0f0f0;
}

.price{color:#0077ff}

/* RIGHT */
.right{
  flex:1;
  padding:15px;
}

canvas{
  background:#fff;
  border:1px solid #ddd;
  border-radius:10px;
}

.box{
  display:flex;
  justify-content:space-around;
  margin:10px 0;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
  <h2>Baydınsal Giriş</h2>
  <input id="user" placeholder="Kullanıcı adı">
  <input id="pass" type="password" placeholder="Şifre">
  <button onclick="login()">Giriş / Kayıt</button>
</div>

<!-- MAIN -->
<div id="app" style="display:none;">

<div class="header">
  BAYDINsAL TRADING PANEL
  <div class="balance">Bakiye: <span id="balance">10000</span> ₺</div>
</div>

<div class="container">

  <div class="market" id="market"></div>

  <div class="right">
    <h3 id="title">Seçim Yap</h3>

    <div class="box">
      <div>ALIŞ: <span id="buy">-</span></div>
      <div>SATIŞ: <span id="sell">-</span></div>
    </div>

    <button onclick="buy()">ALIŞ YAP</button>
    <button onclick="sell()">SATIŞ YAP</button>

    <canvas id="chart"></canvas>
  </div>

</div>
</div>

<script>

let userData = JSON.parse(localStorage.getItem("baydinsal")) || {
  balance:10000,
  name:"",
  pass:""
};

let chart;
let history=[];
let currentPrice=0;
let currentName="";

const markets=[
 {name:"USD/TRY", base:"USD"},
 {name:"EUR/USD", base:"EUR"},
 {name:"GBP/USD", base:"GBP"},
 {name:"BTC/USD", base:"BTC"},
 {name:"ETH/USD", base:"ETH"}
];

// LOGIN
function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(!userData.name){
    userData.name=u;
    userData.pass=p;
    localStorage.setItem("baydinsal",JSON.stringify(userData));
  }

  if(u===userData.name && p===userData.pass){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("balance").innerText=userData.balance;
    loadMarkets();
  }else{
    alert("Hatalı giriş");
  }
}

// REAL USD API
async function getRates(){
  let res=await fetch("https://open.er-api.com/v6/latest/USD");
  return await res.json();
}

async function loadMarkets(){
  let data=await getRates();
  let html="";

  markets.forEach(m=>{
    let price=data.rates[m.base]||1;
    let buy=price*1.002;
    let sell=price*0.998;

    html+=`
      <div class="item" onclick="selectMarket('${m.name}',${price})">
        <b>${m.name}</b><br>
        <span class="price">${price.toFixed(4)}</span><br>
        <small>Al:${buy.toFixed(4)} Sat:${sell.toFixed(4)}</small>
      </div>
    `;
  });

  document.getElementById("market").innerHTML=html;
}

function selectMarket(name,price){
  currentPrice=price;
  currentName=name;

  document.getElementById("title").innerText=name;
  document.getElementById("buy").innerText=(price*1.002).toFixed(4);
  document.getElementById("sell").innerText=(price*0.998).toFixed(4);

  addChart(price);
}

// CHART
function addChart(price){
  history.push(price);
  if(history.length>30) history.shift();

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:history.map((_,i)=>i),
      datasets:[{
        data:history,
        borderColor:"blue",
        tension:0.3
      }]
    }
  });
}

// BUY SELL SYSTEM
function buy(){
  if(userData.balance>=1000){
    userData.balance-=1000;
    localStorage.setItem("baydinsal",JSON.stringify(userData));
    document.getElementById("balance").innerText=userData.balance;
    alert("ALIŞ YAPILDI");
  }else alert("Bakiye yetersiz");
}

function sell(){
  userData.balance+=1000;
  localStorage.setItem("baydinsal",JSON.stringify(userData));
  document.getElementById("balance").innerText=userData.balance;
  alert("SATIŞ YAPILDI");
}

// AUTO REFRESH
setInterval(loadMarkets,10000);

</script>

</body>
</html>
