<script>
async function getData(){
  try {
    const res = await fetch("https://open.er-api.com/v6/latest/USD");
    const data = await res.json();

    document.getElementById("data").innerHTML = `
      <div class="box">EUR → ${data.rates.EUR}</div>
      <div class="box">GBP → ${data.rates.GBP}</div>
      <div class="box">TRY → ${data.rates.TRY}</div>
    `;
  } catch(e){
    document.getElementById("data").innerHTML = "Hata oluştu 😢";
  }
}

getData();
</script>
