<!DOCTYPE html>
<html lang="tr">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Video İndirici - TikTok & Instagram</title>
 <style>
 :root {
 --bg-color: #121212;
 --card-bg: #1e1e1e;
 --text-color: #ffffff;
 --input-bg: #2a2a2a;
 
 /* Platform Renkleri */
 --tiktok-primary: #fe2c55;
 --tiktok-secondary: #25f4ee;
 --insta-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
 }

 * {
 margin: 0;
 padding: 0;
 box-sizing: border-box;
 font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
 transition: all 0.3s ease;
 }

 body {
 background-color: var(--bg-color);
 color: var(--text-color);
 display: flex;
 flex-direction: column;
 min-height: 100vh;
 align-items: center;
 justify-content: center;
 padding: 20px;
 }

 .container {
 background-color: var(--card-bg);
 padding: 40px;
 border-radius: 20px;
 box-shadow: 0 15px 40px rgba(0,0,0,0.6);
 width: 100%;
 max-width: 600px;
 text-align: center;
 position: relative;
 border-top: 5px solid transparent;
 background-clip: padding-box;
 }

 /* Dinamik Çerçeve Efekti */
 .container::before {
 content: '';
 position: absolute;
 top: -5px; left: -5px; right: -5px; bottom: -5px;
 background: var(--border-gradient, linear-gradient(45deg, #fe2c55, #25f4ee));
 z-index: -1;
 border-radius: 25px;
 opacity: 0.8;
 }

 h1 {
 margin-bottom: 10px;
 font-size: 2rem;
 font-weight: 700;
 }

 .highlight {
 color: var(--accent-color, #fe2c55);
 }

 p {
 margin-bottom: 30px;
 color: #b0b0b0;
 font-size: 1rem;
 line-height: 1.5;
 }

 /* Platform Seçici Butonlar */
 .platform-selector {
 display: flex;
 justify-content: center;
 gap: 15px;
 margin-bottom: 25px;
 }

 .platform-btn {
 flex: 1;
 padding: 12px;
 border: 2px solid transparent;
 border-radius: 12px;
 background: #2a2a2a;
 color: #aaa;
 font-weight: 600;
 cursor: pointer;
 position: relative;
 overflow: hidden;
 }

 .platform-btn.active {
 color: white;
 border-color: transparent;
 }

 .platform-btn.active.tiktok {
 background: var(--tiktok-primary);
 box-shadow: 0 0 15px rgba(254, 44, 85, 0.4);
 }

 .platform-btn.active.instagram {
 background: var(--insta-gradient);
 box-shadow: 0 0 15px rgba(225, 48, 108, 0.4);
 }

 .input-group {
 display: flex;
 gap: 10px;
 margin-bottom: 20px;
 flex-wrap: wrap;
 }

 input[type="url"] {
 flex: 1;
 min-width: 200px;
 padding: 15px;
 border-radius: 12px;
 border: 1px solid #333;
 background-color: var(--input-bg);
 color: white;
 font-size: 1rem;
 outline: none;
 }

 input[type="url"]:focus {
 border-color: var(--accent-color, #fe2c55);
 box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
 }

 button#downloadBtn {
 padding: 15px 30px;
 border-radius: 12px;
 border: none;
 background: var(--accent-gradient, linear-gradient(45deg, #fe2c55, #25f4ee));
 color: white;
 font-weight: bold;
 font-size: 1rem;
 cursor: pointer;
 min-width:
