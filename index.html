<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Pro Trading Panel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0a0f1f;
  color:white;
}

/* TOP BAR */
.header{
  padding:15px;
  text-align:center;
  font-size:22px;
  color:#00ffcc;
  background:#111a2e;
}

/* LAYOUT */
.container{
  display:flex;
  height:calc(100vh - 60px);
}

/* LEFT MARKET LIST */
.market{
  width:35%;
  background:#0f1629;
  overflow:auto;
  border-right:1px solid #222;
}

.item{
  padding:15px;
  border-bottom:1px solid #1f2a44;
  cursor:pointer;
}

.item:hover{
  background:#16213e;
}

.symbol{
  font-weight:bold;
}

.price{
  color:#00ffcc;
}

/* RIGHT CHART */
.right{
  flex:1;
  padding:20px;
}

canvas{
  background:#111a2e;
  border-radius:12px;
  padding:10px;
}

/* BUY SELL */
.box{
  margin-top:10px;
  display:flex;
  justify-content:space-around;
}

.buy{color:#00ff99;}
.sell{color:#ff4d4d;}
</style>
</head>

<body>

<div class="header">📊 PRO TRADING PANEL (Midas Style)</div>

<div class="container">

  <div class="market" id="market"></div>

  <div class="right">
    <h3 id="title">Seçim Yap</h3>

    <div class="box">
      <div class="buy">ALIŞ: <span id="buy">-</span></div>
      <div class="sell">SATIŞ: <span id="sell">-</span></div>
    </div>

    <canvas id="chart"></canvas>
  </div>

</div>

<script>
let chart;
let history = [];
let selected = "USDTRY";

const markets = [
  {name:"USD/TRY", base:"USD", quote:"TRY"},
  {name:"EUR/USD", base:"EUR", quote:"USD"},
  {name:"GBP/USD", base:"GBP", quote:"USD"},
  {name:"BTC/USD", base:"BTC", quote:"USD"},
  {name:"ETH/USD", base:"ETH", quote:"USD"},
  {name:"JPY/USD", base:"JPY", quote:"USD"}
];

async function loadMarkets(){
  const res = await fetch("https://open.er-api.com/v6/latest/USD");
  const data = await res.json();

  let html = "";

  markets.forEach(m => {
    let rate = data.rates[m.base] || (1 / data.rates[m.quote]);

    let price = rate.toFixed(4);
    let buy = (price * 1.002).toFixed(4);
    let sell = (price * 0.998).toFixed(4);

    html += `
      <div class="item" onclick="selectMarket('${m.name}',${price})">
        <div class="symbol">${m.name}</div>
        <div class="price">${price}</div>
        <small class="buy">B:${buy} S:${sell}</small>
      </div>
    `;
  });

  document.getElementById("market").innerHTML = html;
}

function selectMarket(name, price){
  document.getElementById("title").innerText = name;

  document.getElementById("buy").innerText = (price * 1.002).toFixed(4);
  document.getElementById("sell").innerText = (price * 0.998).toFixed(4);

  updateChart(price);
}

function updateChart(value){
  history.push(Number(value));
  if(history.length > 20) history.shift();

  const ctx = document.getElementById("chart").getContext("2d");

  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:"line",
    data:{
      labels: history.map((_,i)=>i+1),
      datasets:[{
        label:"Fiyat",
        data:history,
        borderColor:"#00ffcc",
        tension:0.3
      }]
    }
  });
}

loadMarkets();
setInterval(loadMarkets,5000);
</script>

</body>
</html>
