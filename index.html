<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Kaçan Kutu Oyunu</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      text-align: center;
    }

    #kutu {
      width: 80px;
      height: 80px;
      background: red;
      position: absolute;
      cursor: pointer;
      border-radius: 10px;
    }

    #puan {
      position: fixed;
      top: 10px;
      left: 10px;
      font-size: 24px;
    }
  </style>
</head>
<body>

<div id="puan">Puan: 0</div>
<div id="kutu"></div>

<script>
let puan = 0;
let kutu = document.getElementById("kutu");

// Kutuya tıklayınca
kutu.onclick = function() {
  puan++;
  document.getElementById("puan").innerText = "Puan: " + puan;
  hareketEt();
};

// Rastgele hareket
function hareketEt() {
  let x = Math.random() * (window.innerWidth - 80);
  let y = Math.random() * (window.innerHeight - 80);
  kutu.style.left = x + "px";
  kutu.style.top = y + "px";
}

// Sürekli kaçsın
setInterval(hareketEt, 1000);

hareketEt();
</script>

</body>
</html>
