<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Baydınsal Pro MAX</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6fb;
  transition:0.3s;
}

/* DARK MODE */
body.dark{
  background:#0b1220;
  color:white;
}

.header{
  padding:12px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  background:white;
}
body.dark .header{background:#111a2e;}

.topbar{
  display:flex;
  gap:10px;
  justify-content:center;
  padding:10px;
}

input{
  padding:8px;
  width:200px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#0b57ff;
  color:white;
}

.container{
  display:flex;
  height:calc(100vh - 120px);
}

.left{
  width:35%;
  background:white;
  overflow:auto;
  border-right:1px solid #ddd;
}
body.dark .left{background:#111a2e;}

.item{
  padding:12px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
body.dark .item{border-color:#222;}

.item:hover{background:#eef3ff;}
body.dark .item:hover{background:#1b2a4a;}

.symbol{font-weight:bold;}
.price{color:#0b57ff;}

.right{
  flex:1;
  padding:15px;
}

canvas{
  background:white;
  border-radius:10px;
}
body.dark canvas{background:#111a2e;}

.box{
  display:flex;
  justify-content:space-around;
  margin:10px 0;
  font-weight:bold;
}

.buy{color:green;}
.sell{color:red;}
</style>
</head>

<body>

<div class="header">📊 BAYDINNSAL PRO MAX</div>

<div class="topbar">
<input id="search" placeholder="Ara (BTC, USD, EUR...)" onkeyup="render()">
<button onclick="toggleDark()">🌙</button>
</div>

<div class="container">

<div class="left" id="list"></div>

<div class="right">
<h3 id="title">Seçim yap</h3>

<div class="box">
<div class="buy">ALIŞ: <span id="buy">-</span></div>
<div class="sell">SATIŞ: <span id="sell">-</span></div>
</div>

<canvas id="chart"></canvas>
</div>

</div>

<script>
let chart;
let history=[];
let dataList=[];

/* FAVORİ */
let fav = JSON.parse(localStorage.getItem("fav")||"[]");

/* KRİPTO API (GERÇEK) */
async function getCrypto(){
  const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,ripple,dogecoin&vs_currencies=usd");
  const d = await res.json();

  return [
    {name:"BTC/USD", price:d.bitcoin.usd},
    {name:"ETH/USD", price:d.ethereum.usd},
    {name:"SOL/USD", price:d.solana.usd},
    {name:"XRP/USD", price:d.ripple.usd},
    {name:"DOGE/USD", price:d.dogecoin.usd}
  ];
}

/* FX */
async function getFX(){
  const res = await fetch("https://open.er-api.com/v6/latest/USD");
  const d = await res.json();

  return [
    {name:"USD/TRY", price:d.rates.TRY},
    {name:"EUR/USD", price:1/d.rates.EUR},
    {name:"GBP/USD", price:1/d.rates.GBP}
  ];
}

/* Borsa (simülasyon) */
function getIndex(){
  const arr=["BIST100","NASDAQ","DOW JONES","DAX","S&P500"];
  return arr.map(i=>({name:i,price:(Math.random()*20000+1000).toFixed(2)}));
}

/* TOPLA */
async function load(){
  const fx = await getFX();
  const cr = await getCrypto();
  const ind = getIndex();

  dataList=[...fx,...cr,...ind];
  render();
}

/* RENDE */
function render(){
  let q=document.getElementById("search").value.toLowerCase();
  let html="";

  dataList
  .filter(x=>x.name.toLowerCase().includes(q))
  .forEach(d=>{

    let buy=(d.price*1.002).toFixed(2);
    let sell=(d.price*0.998).toFixed(2);

    let star = fav.includes(d.name) ? "⭐" : "☆";

    html+=`
      <div class="item" onclick="selectItem('${d.name}',${d.price})">
        <div class="symbol">${star} ${d.name}</div>
        <div class="price">${d.price}</div>
        <small>B:${buy} S:${sell}</small>
      </div>
    `;
  });

  document.getElementById("list").innerHTML=html;
}

/* SEÇ */
function selectItem(name,price){

  document.getElementById("title").innerText=name;

  document.getElementById("buy").innerText=(price*1.002).toFixed(2);
  document.getElementById("sell").innerText=(price*0.998).toFixed(2);

  history.push(Number(price));
  if(history.length>30) history.shift();

  const ctx=document.getElementById("chart").getContext("2d");
  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:"line",
    data:{
      labels:history.map((_,i)=>i+1),
      datasets:[{
        data:history,
        borderColor:"#0b57ff",
        tension:0.3
      }]
    }
  });

  /* FAVORİ EKLE */
  if(!fav.includes(name)){
    fav.push(name);
    localStorage.setItem("fav",JSON.stringify(fav));
  }
}

/* DARK MODE */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* START */
load();
setInterval(load,8000);
</script>

</body>
</html>
