<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Baydınsal Trading</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#eaf4ff,#ffffff);
}

/* TOP MENU */
.top{
  background:white;
  padding:12px;
  border-bottom:1px solid #d9e6ff;
  display:flex;
  justify-content:center;
  gap:20px;
  font-weight:bold;
}

.tab{
  cursor:pointer;
  padding:8px 15px;
  border-radius:8px;
  background:#f2f8ff;
}

.tab:hover{
  background:#d9ecff;
}

/* LEFT LIST */
.container{
  display:flex;
  height:calc(100vh - 50px);
}

.left{
  width:35%;
  background:white;
  border-right:1px solid #d9e6ff;
  overflow:auto;
}

.item{
  padding:12px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.item:hover{
  background:#f0f7ff;
}

.price{color:#0077ff}

/* RIGHT */
.right{
  flex:1;
  padding:15px;
}

canvas{
  background:white;
  border:1px solid #d9e6ff;
  border-radius:10px;
}

.title{
  font-size:20px;
  font-weight:bold;
  margin-bottom:10px;
}

.box{
  display:flex;
  justify-content:space-around;
  margin:10px 0;
  font-weight:bold;
}

.buy{color:#00a86b}
.sell{color:#ff3b3b}
</style>
</head>

<body>

<!-- TOP MENU -->
<div class="top">
  <div class="tab" onclick="setMarket('DOVIZ')">💱 Döviz</div>
  <div class="tab" onclick="setMarket('ALTIN')">🟡 Altın</div>
  <div class="tab" onclick="setMarket('KRIPTO')">₿ Kripto</div>
</div>

<div class="container">

<div class="left" id="list"></div>

<div class="right">

  <div class="title" id="title">Seçim Yap</div>

  <div class="box">
    <div class="buy">ALIŞ: <span id="buy">-</span></div>
    <div class="sell">SATIŞ: <span id="sell">-</span></div>
  </div>

  <canvas id="chart"></canvas>
</div>

</div>

<script>

let chart;
let history=[];

let mode="DOVIZ";

// VARLIKLAR
const dataSets={
  DOVIZ:[
    {name:"USD/TRY", base:"USD"},
    {name:"EUR/TRY", base:"EUR"},
    {name:"GBP/TRY", base:"GBP"}
  ],
  ALTIN:[
    {name:"Gram Altın", base:"XAU"},
    {name:"Ons Altın", base:"XAU"},
    {name:"Çeyrek Altın", base:"XAU"},
    {name:"Cumhuriyet Altını", base:"XAU"}
  ],
  KRIPTO:[
    {name:"BTC/USD", base:"BTC"},
    {name:"ETH/USD", base:"ETH"}
  ]
};

// API
async function getRates(){
  let res=await fetch("https://open.er-api.com/v6/latest/USD");
  return await res.json();
}

// MENÜ DEĞİŞTİR
function setMarket(m){
  mode=m;
  load();
}

// LİSTE
async function load(){
  let data=await getRates();
  let list=dataSets[mode];
  let html="";

  list.forEach(a=>{

    let price = data.rates["TRY"] || (Math.random()*1000+100);

    // ALTIN TÜRLERİ SAHTE ORANLAMA
    if(a.name.includes("Altın")){
      if(a.name.includes("Gram")) price = 2400;
      if(a.name.includes("Ons")) price = 2000;
      if(a.name.includes("Çeyrek")) price = 4000;
      if(a.name.includes("Cumhuriyet")) price = 16000;
    }

    let buy=price*1.002;
    let sell=price*0.998;

    html+=`
      <div class="item" onclick="select('${a.name}',${price})">
        <b>${a.name}</b><br>
        <span class="price">${price.toFixed(2)}</span><br>
        <small>Al:${buy.toFixed(2)} Sat:${sell.toFixed(2)}</small>
      </div>
    `;
  });

  document.getElementById("list").innerHTML=html;
}

// SEÇİM
function select(name,price){
  document.getElementById("title").innerText=name;

  document.getElementById("buy").innerText=(price*1.002).toFixed(2);
  document.getElementById("sell").innerText=(price*0.998).toFixed(2);

  draw(price);
}

// GRAFİK
function draw(price){
  history.push(price);
  if(history.length>25) history.shift();

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:history.map((_,i)=>i+1),
      datasets:[{
        data:history,
        borderColor:"#0077ff",
        tension:0.3
      }]
    }
  });
}

load();

</script>

</body>
</html>
