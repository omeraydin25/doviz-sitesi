<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Döviz Takip</title>

<style>
body{
  font-family: Arial;
  background:#0f0f0f;
  color:white;
  text-align:center;
  padding:20px;
}
h1{ color:#00ffcc; }

.box{
  background:#1e1e1e;
  margin:10px auto;
  padding:15px;
  width:220px;
  border-radius:10px;
}

button{
  padding:10px 20px;
  background:#00ffcc;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>💱 Döviz Takip</h1>

<div id="data">Yükleniyor...</div>

<button onclick="getData()">🔄 Yenile</button>

<script>
async function getData(){
  const box = document.getElementById("data");

  try {
    const res = await fetch("https://open.er-api.com/v6/latest/USD");
    const data = await res.json();

    box.innerHTML = `
      <div class="box">EUR → ${data.rates.EUR}</div>
      <div class="box">GBP → ${data.rates.GBP}</div>
      <div class="box">TRY → ${data.rates.TRY}</div>
    `;
  } catch (e) {
    box.innerHTML = "Hata oluştu 😢";
    console.log(e);
  }
}

getData();
</script>

</body>
</html>
