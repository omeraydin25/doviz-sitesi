<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Döviz Pro</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f0f0f,#1c1c1c);
  color:white;
  text-align:center;
}

h1{
  margin-top:20px;
  color:#00ffcc;
}

.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:20px;
}

.card{
  background:#222;
  width:250px;
  padding:15px;
  margin:10px;
  border-radius:12px;
  box-shadow:0 0 10px #000;
  font-size:18px;
}

button{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#00ffcc;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>💱 Döviz Pro</h1>

<div class="container" id="data">Yükleniyor...</div>

<button onclick="getData()">🔄 Yenile</button>

<script>
async function getData(){
  const box = document.getElementById("data");

  try {
    const res = await fetch("https://open.er-api.com/v6/latest/USD");
    const data = await res.json();

    box.innerHTML = `
      <div class="card">💵 USD → TRY: ${data.rates.TRY}</div>
      <div class="card">💶 EUR → USD: ${data.rates.EUR}</div>
      <div class="card">💷 GBP → USD: ${data.rates.GBP}</div>
    `;
  } catch(e){
    box.innerHTML = "Hata 😢";
  }
}

getData();
setInterval(getData, 10000);
</script>

</body>
</html>
