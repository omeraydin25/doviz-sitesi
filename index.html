<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Baydınsal Ultra Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#eaf4ff,#ffffff);
}

/* TOP BAR */
.top{
  background:white;
  padding:10px;
  border-bottom:1px solid #d9e6ff;
  display:flex;
  justify-content:center;
  gap:12px;
  font-weight:bold;
}

.tab{
  padding:8px 12px;
  background:#f2f8ff;
  border-radius:8px;
  cursor:pointer;
}
.tab:hover{background:#d9ecff}

/* LAYOUT */
.container{
  display:flex;
  height:calc(100vh - 50px);
}

.left{
  width:35%;
  background:white;
  border-right:1px solid #d9e6ff;
  overflow:auto;
}

.item{
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.item:hover{background:#f0f7ff}

.price{color:#0077ff}

/* RIGHT */
.right{
  flex:1;
  padding:10px;
}

canvas{
  background:white;
  border:1px solid #d9e6ff;
  border-radius:10px;
}

.title{
  font-size:18px;
  font-weight:bold;
}

/* BOXES */
.box{
  display:flex;
  justify-content:space-around;
  margin:10px 0;
}

.green{color:green}
.red{color:red}

input,button{
  padding:6px;
}
button{
  background:#0077ff;
  color:white;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="top">
  <div class="tab" onclick="setMode('ALTIN')">🟡 Altın</div>
  <div class="tab" onclick="setMode('DOVIZ')">💱 Döviz</div>
  <div class="tab" onclick="setMode('BORSA')">📊 Borsa</div>
</div>

<div class="container">

<div class="left" id="list"></div>

<div class="right">

  <div class="title" id="title">Seçim Yap</div>

  <div class="box">
    <div>ALIŞ: <span id="buy">-</span></div>
    <div>SATIŞ: <span id="sell">-</span></div>
  </div>

  <div class="box">
    <div>PORTFÖY: <span id="portfolio">0</span> ₺</div>
    <div>K/Z: <span id="profit">0</span> ₺</div>
  </div>

  <div>
    <input id="alarm" placeholder="Alarm fiyat">
    <button onclick="setAlarm()">Alarm</button>
    <button onclick="buy()">AL</button>
    <button onclick="sell()">SAT</button>
  </div>

  <canvas id="chart"></canvas>
</div>

</div>

<script>

let chart;
let history=[];
let mode="ALTIN";
let currentPrice=0;
let buyPrice=0;
let portfolio=10000;
let alarm=null;

// VERİLER
const data={
 ALTIN:[
  {name:"Gram Altın",price:2400},
  {name:"Çeyrek Altın",price:4000},
  {name:"Yarım Altın",price:8000},
  {name:"Tam Altın",price:16000},
  {name:"Cumhuriyet Altını",price:16500},
  {name:"Ons Altın",price:2000}
 ],
 DOVIZ:[
  {name:"USD/TRY",price:32},
  {name:"EUR/TRY",price:34},
  {name:"GBP/TRY",price:40}
 ],
 BORSA:[
  {name:"BIST 100",price:10000},
  {name:"NASDAQ",price:18000},
  {name:"S&P 500",price:5000},
  {name:"DAX",price:18000}
 ]
};

function setMode(m){
  mode=m;
  load();
}

// LİSTE
function load(){
  let list=data[mode];
  let html="";

  list.forEach(x=>{
    let price=x.price + (Math.random()*20-10);

    html+=`
      <div class="item" onclick="select('${x.name}',${price})">
        <b>${x.name}</b><br>
        <span class="price">${price.toFixed(2)}</span>
      </div>
    `;
  });

  document.getElementById("list").innerHTML=html;
}

// SEÇ
function select(name,price){
  currentPrice=price;

  document.getElementById("title").innerText=name;
  document.getElementById("buy").innerText=(price*1.002).toFixed(2);
  document.getElementById("sell").innerText=(price*0.998).toFixed(2);

  draw(price);
}

// AL
function buy(){
  buyPrice=currentPrice;
  portfolio-=1000;
  updatePortfolio();
}

// SAT
function sell(){
  let profit=currentPrice-buyPrice;
  portfolio+=1000+profit*10;
  updatePortfolio();
}

// PORTFÖY
function updatePortfolio(){
  document.getElementById("portfolio").innerText=portfolio.toFixed(2);
  document.getElementById("profit").innerText=(portfolio-10000).toFixed(2);
}

// GRAFİK
function draw(price){
  history.push(price);
  if(history.length>30) history.shift();

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:history.map((_,i)=>i+1),
      datasets:[{
        data:history,
        borderColor:"#0077ff",
        tension:0.3
      }]
    }
  });

  checkAlarm(price);
}

// ALARM
function setAlarm(){
  alarm=Number(document.getElementById("alarm").value);
  alert("Alarm kuruldu: "+alarm);
}

function checkAlarm(price){
  if(alarm && price>=alarm){
    alert("🚨 FİYAT ALARMI!");
    alarm=null;
  }
}

load();

</script>

</body>
</html>
