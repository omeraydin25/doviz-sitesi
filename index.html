<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Canlı Döviz</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:white;
}

.header{
  padding:20px;
  text-align:center;
  background:#111a2e;
  font-size:22px;
  font-weight:bold;
  color:#00ffcc;
}

.grid{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
  margin-top:20px;
}

.card{
  background:#16213e;
  padding:20px;
  border-radius:12px;
  width:180px;
  text-align:center;
  box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.card h2{
  margin:0;
  font-size:16px;
  color:#aaa;
}

.card p{
  font-size:20px;
  margin-top:10px;
  color:#00ffcc;
}

.chartBox{
  width:90%;
  max-width:600px;
  margin:30px auto;
  background:#16213e;
  padding:20px;
  border-radius:12px;
}

button{
  display:block;
  margin:20px auto;
  padding:10px 20px;
  background:#00ffcc;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">💱 Canlı Döviz Takip</div>

<div class="grid" id="data">
  Yükleniyor...
</div>

<button onclick="getData()">🔄 Güncelle</button>

<div class="chartBox">
  <canvas id="chart"></canvas>
</div>

<script>
let chart;
let history = [];

async function getData(){
  const res = await fetch("https://open.er-api.com/v6/latest/USD");
  const data = await res.json();

  document.getElementById("data").innerHTML = `
    <div class="card">
      <h2>USD / TRY</h2>
      <p>${data.rates.TRY}</p>
    </div>

    <div class="card">
      <h2>EUR / USD</h2>
      <p>${data.rates.EUR}</p>
    </div>

    <div class="card">
      <h2>GBP / USD</h2>
      <p>${data.rates.GBP}</p>
    </div>
  `;

  updateChart(data.rates.TRY);
}

function updateChart(value){
  history.push(Number(value));
  if(history.length > 10) history.shift();

  const ctx = document.getElementById("chart");

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: history.map((_,i)=>i+1),
      datasets: [{
        label: "USD/TRY",
        data: history,
        borderColor: "#00ffcc",
        tension: 0.3
      }]
    }
  });
}

getData();
setInterval(getData, 10000);
</script>

</body>
</html>
