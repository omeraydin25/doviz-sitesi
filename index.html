<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Baydınsal Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6fb;
}

/* HEADER */
.header{
  padding:14px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  background:white;
  border-bottom:1px solid #ddd;
}

/* TABS */
.tabs{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  background:#fff;
}

.tab{
  padding:8px 15px;
  border:1px solid #ddd;
  cursor:pointer;
  border-radius:8px;
  background:#f8f9ff;
}

.tab.active{
  background:#0b57ff;
  color:white;
}

/* LAYOUT */
.container{
  display:flex;
  height:calc(100vh - 110px);
}

.left{
  width:35%;
  background:white;
  border-right:1px solid #ddd;
  overflow:auto;
}

.item{
  padding:12px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.item:hover{
  background:#eef3ff;
}

.symbol{font-weight:bold;}
.price{color:#0b57ff;}

.right{
  flex:1;
  padding:15px;
}

canvas{
  background:white;
  border:1px solid #ddd;
  border-radius:10px;
}

.box{
  display:flex;
  justify-content:space-around;
  margin:10px 0;
  font-weight:bold;
}

.buy{color:green;}
.sell{color:red;}
</style>
</head>

<body>

<div class="header">📊 BAYDINNSAL PRO TRADING PANEL</div>

<div class="tabs">
  <div class="tab active" onclick="setTab('fx')">Döviz</div>
  <div class="tab" onclick="setTab('crypto')">Kripto</div>
  <div class="tab" onclick="setTab('index')">Borsa</div>
</div>

<div class="container">

  <div class="left" id="list"></div>

  <div class="right">
    <h3 id="title">Seçim Yap</h3>

    <div class="box">
      <div class="buy">ALIŞ: <span id="buy">-</span></div>
      <div class="sell">SATIŞ: <span id="sell">-</span></div>
    </div>

    <canvas id="chart"></canvas>
  </div>

</div>

<script>
let chart;
let history=[];
let currentTab="fx";

/* VERİLER */
const crypto = ["BTC","ETH","SOL","XRP","DOGE"];
const index = ["BIST100","NASDAQ","DOW JONES","DAX","S&P500"];

/* GERÇEK DÖVİZ API */
async function getFX(){
  const res = await fetch("https://open.er-api.com/v6/latest/USD");
  const data = await res.json();

  return [
    {name:"USD/TRY", price:data.rates.TRY},
    {name:"EUR/USD", price:1/data.rates.EUR},
    {name:"GBP/USD", price:1/data.rates.GBP}
  ];
}

/* RANDOM KRİPTO */
function getCrypto(){
  return crypto.map(c=>({
    name:c+"/USD",
    price:(Math.random()*30000+100).toFixed(2)
  }));
}

/* RANDOM INDEX */
function getIndex(){
  return index.map(i=>({
    name:i,
    price:(Math.random()*20000+1000).toFixed(2)
  }));
}

/* TAB */
function setTab(t){
  currentTab=t;

  document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"));
  event.target.classList.add("active");

  load();
}

/* YÜKLE */
async function load(){
  let data=[];

  if(currentTab==="fx") data = await getFX();
  if(currentTab==="crypto") data = getCrypto();
  if(currentTab==="index") data = getIndex();

  let html="";

  data.forEach(d=>{
    let buy=(d.price*1.002).toFixed(2);
    let sell=(d.price*0.998).toFixed(2);

    html+=`
      <div class="item" onclick="selectItem('${d.name}',${d.price})">
        <div class="symbol">${d.name}</div>
        <div class="price">${d.price}</div>
        <small>B:${buy} S:${sell}</small>
      </div>
    `;
  });

  document.getElementById("list").innerHTML=html;
}

/* SEÇ */
function selectItem(name,price){
  document.getElementById("title").innerText=name;

  document.getElementById("buy").innerText=(price*1.002).toFixed(2);
  document.getElementById("sell").innerText=(price*0.998).toFixed(2);

  history.push(Number(price));
  if(history.length>20) history.shift();

  const ctx=document.getElementById("chart").getContext("2d");

  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:"line",
    data:{
      labels:history.map((_,i)=>i+1),
      datasets:[{
        data:history,
        borderColor:"#0b57ff",
        tension:0.3
      }]
    }
  });
}

load();
setInterval(load,5000);
</script>

</body>
</html>
